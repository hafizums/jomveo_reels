[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["."]
addopts = "-ra"
markers = [
  "live_provider: tests that call real external provider APIs and require explicit opt-in",
]

[tool.ruff]
target-version = "py310"
line-length = 100
exclude = ["backend/generated", ".pycaps_repo"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]
